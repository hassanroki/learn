<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX - C01</title>
    </span>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.css"><span
        class="pln">
</head>

<body>
    <div class="container">
        <h1>Product Data</h1>
        <a href="" class="button">Add New</a>
        <div class="row">
            <div class="column">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Product Code</th>
                            <th>Unit Price</th>
                            <th>Qty</th>
                            <th>Total Price</th>
                            <th>Delete</th>
                            <th>Edit</th>
                        </tr>
                    </thead>

                    <tbody id="productData">

                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        async function getProducts() {
            let url = 'https://crud.teamrabbil.com/api/v1/ReadProduct';
            let response = await axios.get(url);
            // console.log(response);
            let products = response.data['data'];
            // console.log(products);
            products.forEach((item) => {
                document.getElementById('productData').innerHTML += (`<tr>
                            <td>${item['ProductName']}</td>
                            <td>0001</td>
                            <td>100</td>
                            <td>3</td>
                            <td>1000</td>
                            <td>Delete</td>
                            <td>Edit</td>
                        </tr>`);
            });
            
        }
        getProducts();
    </script>
</body>

</html>
